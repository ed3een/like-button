<!DOCTYPE html>
<head>
  <style>



    button{
  background:#000000;
  font-size:8px;
  color:#26edff;
  border: none;
  display: inline-block;
  cursor: pointer;
}

button:hover {
  color: #ffffff;
  text-decoration: underline;
}
  </style>
</head>

<body>
  <div id= "1" class= "post">
    <button class="like_button">Like <span class="likes">0</span> </button>
  </div>

<script>
  const CLOUDFLARE_URL = "https://tight-cloud-55d1.eddeenn-xne.workers.dev/";


  if (localStorage.getItem("liked_post_1")) {
    document.querySelector(".like_button").disabled = true;
  }


  fetch(CLOUDFLARE_URL, {
    method: "GET"
  })
  .then(response => response.json())
  .then(posts => {

    const currentPost = posts.find(p => p.id === 1);
    if (currentPost) {
      document.querySelector(".likes").innerText = currentPost.likes;
    }

  });




  
  const likeButton = (event) => {

    if (localStorage.getItem("liked_post_1")) {
      return;
    }

    const post = event.target.closest(".post");

    const likes = post.querySelector(".likes");
    
    let num = parseInt(likes.innerText);

    num += 1;

    likes.innerText = num;

    fetch(CLOUDFLARE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id: 1, likes: num })
    });

    localStorage.setItem("liked_post_1", "true");

    event.target.disabled = true;

  };
  
  const buttons = document.querySelectorAll(".like_button");
  buttons.forEach(button => {

    button.addEventListener("click", likeButton);

  });
</script>
</body>
